<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Play Chips">
  <defs>
    <radialGradient id="g" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#FFF4B0"/>
      <stop offset="55%" stop-color="#FFD34D"/>
      <stop offset="100%" stop-color="#E4A100"/>
    </radialGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF3B3"/>
      <stop offset="100%" stop-color="#B87900"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Coin body -->
  <circle cx="64" cy="64" r="54" fill="url(#g)" filter="url(#shadow)"/>

  <!-- Outer rim -->
  <circle cx="64" cy="64" r="54" fill="none" stroke="url(#rim)" stroke-width="6"/>
  <circle cx="64" cy="64" r="44" fill="none" stroke="#FFE28A" stroke-opacity="0.9" stroke-width="3"/>

  <!-- Rim ticks -->
  <g stroke="#B87900" stroke-opacity="0.65" stroke-width="3" stroke-linecap="round">
    <path d="M64 10v10"/>
    <path d="M64 108v10"/>
    <path d="M10 64h10"/>
    <path d="M108 64h10"/>
    <path d="M26.3 26.3l7.1 7.1"/>
    <path d="M94.6 94.6l7.1 7.1"/>
    <path d="M101.7 26.3l-7.1 7.1"/>
    <path d="M33.4 94.6l-7.1 7.1"/>
  </g>

  <!-- Subtle inner shine -->
  <path d="M30 56c6-18 24-30 44-30 6 0 12 1 17 3-8-9-20-15-34-15-22 0-40 15-44 35 4 2 10 4 17 7z" fill="#FFFFFF" opacity="0.22"/>

  <!-- Letter P -->
  <g filter="url(#shadow)">
    <path d="M52 88V38h20c12 0 21 7 21 18 0 11-9 18-21 18H64v14H52zm12-26h8c6 0 9-3 9-6 0-4-3-7-9-7h-8v13z"
          fill="#1A1A1A" opacity="0.9"/>
    <path d="M52 88V38h20c12 0 21 7 21 18 0 11-9 18-21 18H64v14H52zm12-26h8c6 0 9-3 9-6 0-4-3-7-9-7h-8v13z"
          fill="none" stroke="#FFF3B3" stroke-width="2" opacity="0.55"/>
  </g>

  <!-- Small coin accent (bottom-right) -->
  <g transform="translate(86 84)">
    <circle cx="0" cy="0" r="14" fill="url(#g)"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="url(#rim)" stroke-width="3"/>
    <path d="M-3 5V-6h6c4 0 7 2 7 5 0 3-3 5-7 5H1v6h-4zM1 1h2c2 0 3-1 3-2 0-1-1-2-3-2H1v4z"
          fill="#1A1A1A" opacity="0.9"/>
  </g>
</svg>
